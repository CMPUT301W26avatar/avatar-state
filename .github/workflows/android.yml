name: Android CI

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Grant execute permission for gradlew
        run: cd LotteryApp && chmod +x ./gradlew
      - name: Run unit tests
        run: cd LotteryApp && ./gradlew clean testDebugUnitTest

  # NOTE: This only builds if branch is main
  build:
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.ref == 'refs/heads/main' && 
      needs.test.result == 'success'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Grant execute permission for gradlew
        run: cd LotteryApp && chmod +x ./gradlew
      - name: Run
        run: cd LotteryApp && ./gradlew clean testDebugUnitTest
