name: Android CI

# TODO: Change rules when merging INTO main
on: [push]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: cd LotteryApp && chmod +x ./gradlew

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run unit tests
        run: cd LotteryApp && ./gradlew clean testDebugUnitTest

  # NOTE: This only builds if branch is main
  build:
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.ref == 'refs/heads/main' && 
      needs.test.result == 'success'

    steps:
      - name: Run
        run: cd LotteryApp && ./gradlew clean build

